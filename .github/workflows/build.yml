name: Build and Release

on:
  pull_request:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Resolve Release Version
        id: vars
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const content = fs.readFileSync('gradle.properties', 'utf8');
            const match = content.match(/^mod_version\s*=\s*(.+)\s*$/m);
            if (!match) {
              core.setFailed('mod_version was not found in gradle.properties');
              return;
            }

            const baseVersion = match[1].trim().replace(/^[vV]/, '');
            const prefix = `${baseVersion}-r`;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            let maxRevision = 0;
            for (const release of releases) {
              const tag = (release.tag_name || '').trim().replace(/^[vV]/, '');
              if (!tag.startsWith(prefix)) continue;

              const revision = Number.parseInt(tag.slice(prefix.length), 10);
              if (Number.isInteger(revision) && revision > maxRevision) {
                maxRevision = revision;
              }
            }

            const releaseVersion = `${baseVersion}-r${maxRevision + 1}`;

            core.setOutput('base_version', baseVersion);
            core.setOutput('release_version', releaseVersion);
            core.setOutput('release_tag', releaseVersion);

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon -Pmod_version=${{ steps.vars.outputs.release_version }}

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ihanuat-${{ steps.vars.outputs.release_version }}
          path: build/libs/*.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          tag_name: "${{ steps.vars.outputs.release_tag }}"
          name: "${{ steps.vars.outputs.release_version }}"
          body: |
            ## Automated Build
            Version: ${{ steps.vars.outputs.release_version }}
            Base Version: ${{ steps.vars.outputs.base_version }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Message: ${{ github.event.head_commit.message }}
          files: build/libs/*.jar
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Discord Webhook
        if: github.event_name == 'push'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ steps.vars.outputs.release_tag }}"
          VERSION="${{ steps.vars.outputs.release_version }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          JAR_FILE=$(basename $(ls build/libs/*.jar | grep -v 'sources' | grep -v 'dev' | head -n 1))
          JAR_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.vars.outputs.release_tag }}/$JAR_FILE"
          
          printf -v DESC_VAR "A new build has been released! :rocket:\n\n**Commit Message:**\n%s" "$COMMIT_MSG"
          
          jq -n \
            --arg title "New Release: $VERSION Automated Build" \
            --arg desc "$DESC_VAR" \
            --arg url "$RELEASE_URL" \
            --arg rel_url "$RELEASE_URL" \
            --arg jar_file "$JAR_FILE" \
            --arg jar_url "$JAR_URL" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 5814783,
                fields: [
                  {
                    name: "Release Page",
                    value: "[View Release](\($rel_url))",
                    inline: true
                  },
                  {
                    name: "Download JAR",
                    value: "[Download \($jar_file)](\($jar_url))",
                    inline: true
                  }
                ]
              }]
            }' > payload.json
          
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -H "Content-Type: application/json" -d @payload.json $DISCORD_WEBHOOK_URL
          else
            echo "Skipping Discord Webhook: DISCORD_WEBHOOK_URL secret is not set"
          fi
